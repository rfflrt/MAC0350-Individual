<div class="hud">
    <span>💣 <span id="mine-count">{{ game.mine_count }}</span></span>
    <span id="timer">00:00</span>
    <button id="flag-btn" onclick="toggleFlag()">🚩 Flag: <span id="flag-label">OFF</span></button>

    {% include "powers_bar.html" %}

    <div id="board-wrap">
    <div id="board"></div>
    </div>

    <div id="overlay" class="overlay hidden">
    <div class="overlay-box">
        <div id="overlay-icon"></div>
        <h2 id="overlay-title"></h2>
        <p id="overlay-msg"></p>
        <button hx-get="/" hx-target="#main" hx-swap="innerHTML" class="btn">
        Play again
        </button>
    </div>
</div>
